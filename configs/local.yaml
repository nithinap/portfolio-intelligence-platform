app_env: local
log_level: INFO
database_url: sqlite:///./data/processed/finance_lm.db
vector_db_provider: pgvector
vector_db_url: ""
qa_answer_provider: deterministic
qa_openai_model: gpt-4o-mini
qa_openai_base_url: https://api.openai.com/v1
qa_openai_timeout_seconds: 20
embedding_provider: sparse-local
retrieval_provider: sparse-local
chunker_provider: simple
chunk_max_chars: 800
chunk_overlap_chars: 120
chunk_max_tokens: 180
chunk_overlap_tokens: 30
market_data_provider: stub
market_data_tickers: AAPL,MSFT,NVDA
market_data_lookback_days: 5
sentiment_provider: lexicon
sentiment_openai_model: gpt-4o-mini
sentiment_openai_base_url: https://api.openai.com/v1
sentiment_openai_timeout_seconds: 20
